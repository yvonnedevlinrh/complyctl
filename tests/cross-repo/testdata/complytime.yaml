policies:
  - url: http://localhost:8765/policies/test-branch-protection
    id: test-ampel-bp
  - url: http://localhost:8765/policies/test-opa-policy
    id: test-opa-k8s

complypacks:
  - url: http://localhost:8765/complypacks/ampel-bp@v1.0.0
    id: ampel-bp-pack
  - url: http://localhost:8765/complypacks/test-opa-complypack@v1.0.0
    id: opa-complypack

targets:
  - id: complyctl-repo
    policies:
      - test-ampel-bp
    variables:
      url: https://github.com/complytime/complyctl
      specs: builtin:github/branch-rules.yaml
  - id: test-k8s-deployment
    policies:
      - test-opa-k8s
    variables:
      input_path: test-deployment.yaml
