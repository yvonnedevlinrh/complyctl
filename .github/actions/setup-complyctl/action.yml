name: "Setup complyctl environment"
description: "Build complyctl, test provider, and mock OCI registry for integration testing"

runs:
    using: composite
    steps:
        - name: Install dependencies
          run: dnf install -y make git jq curl
          shell: bash

        - name: Configure Git for safe directory
          run: git config --global --add safe.directory /__w/complyctl/complyctl
          shell: bash

        - name: Set up Go
          uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
          with:
              go-version-file: './go.mod'

        - name: Build binaries
          run: make build build-test-provider
          shell: bash

        - name: Install test provider
          run: |
              mkdir -p ~/.complytime/providers
              cp bin/complytime-providers-test ~/.complytime/providers/
          shell: bash
