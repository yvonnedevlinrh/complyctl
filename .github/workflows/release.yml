name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to release (e.g., v1.2.3)'
        required: true
        type: string


permissions:
  contents: none
  id-token: none

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write # for github releases
      id-token: write # for keyless signing

    steps:
      - name: Validate Tag
        run: |
          if [[ "${GITHUB_REF:0:10}" != refs/tags/ ]]; then
            echo 'Full Release workflow must be run with a tag, not a branch.'
            exit 1
          fi
          tag="${GITHUB_REF:10}"
          if ! grep -E '^v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*$' <<<"$tag"; then
            echo 'Invalid tag format. Must be semver with only major, minor, and patch, e.g. v1.2.3'
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6.1.0
        with:
          go-version-file: 'go.mod'

      - name: Install cosign for signatures
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Install syft for sboms
        uses: anchore/sbom-action/download-syft@fbfd9c6c189226748411491745178e0c2017392d # v0.20.10

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          version: '~> v2'
          args: --verbose release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ inputs.tag }}
        continue-on-error: false
