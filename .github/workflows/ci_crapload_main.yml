# SPDX-License-Identifier: Apache-2.0

name: CRAP Load Main

on:
    push:
        branches:
            - main
        paths:
            - '**.go'
            - 'go.mod'
            - 'go.sum'
    workflow_dispatch:

permissions:
    contents: read

jobs:
    crapload-analysis:
        name: Full CRAP Load Analysis
        uses: ./.github/workflows/reusable_crapload_analysis.yml
        permissions:
            contents: read
            pull-requests: none
        with:
            post-comment: false
            packages: './...'

    publish-metrics:
        name: Publish Metrics to GitHub Pages
        needs: crapload-analysis
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout gh-pages branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: gh-pages
                  path: gh-pages
              continue-on-error: true
              id: checkout-pages

            - name: Initialize gh-pages if missing
              if: steps.checkout-pages.outcome == 'failure'
              run: |
                  mkdir -p gh-pages
                  cd gh-pages
                  git init
                  git checkout --orphan gh-pages
                  echo '[]' > metrics.json
                  git add metrics.json
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git commit -m "chore: initialize metrics"
                  git remote add origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

            - name: Ensure metrics.json exists
              run: |
                  if [ ! -f gh-pages/metrics.json ]; then
                    echo '[]' > gh-pages/metrics.json
                  fi

            - name: Download analysis artifact
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
              with:
                  name: crapload-analysis
                  path: artifact

            - name: Append metrics entry
              run: |
                  CURRENT="artifact/tmp/crapload-current.json"
                  if [ ! -f "$CURRENT" ]; then
                    echo "::warning::crapload-current.json not found in artifact. Skipping metrics publish."
                    exit 0
                  fi

                  TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
                  ENTRY=$(jq -n \
                    --arg ts "$TIMESTAMP" \
                    --arg sha "${{ github.sha }}" \
                    --arg ref "${{ github.ref_name }}" \
                    --argjson summary "$(jq '.summary' "$CURRENT")" \
                    '{timestamp: $ts, sha: $sha, ref: $ref} + $summary')

                  jq --argjson entry "$ENTRY" '. += [$entry]' gh-pages/metrics.json > gh-pages/tmp.json \
                    && mv gh-pages/tmp.json gh-pages/metrics.json

            - name: Push to gh-pages
              run: |
                  cd gh-pages
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add metrics.json
                  git diff --cached --quiet && echo "No metrics changes to commit." && exit 0
                  git commit -m "metrics: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                  git push origin gh-pages
