title: ComplyTime Gemara-Native Threat Catalog
metadata:
    id: CT.COMPLYCTL
    type: ThreatCatalog
    gemara-version: 1.0.0
    description: >
        Threat catalog for the complytime CLI redesign covering the Gemara-native
        workflow: OCI registry interaction, hashicorp/go-plugin subprocess execution,
        gRPC plugin communication, workspace configuration, policy caching, and
        assessment report generation.
    version: 0.1.0
    author:
        id: jpower432
        name: Jenn Power
        type: Human
    mapping-references:
        - id: CCC
          title: Common Cloud Controls Core
          version: v2025.10
          url: https://github.com/finos/common-cloud-controls/releases
          description: >
              Foundational repository of reusable security controls, capabilities,
              and threat models maintained by FINOS.
        - id: CT.COMPLYCTL.CAP
          title: ComplyTime Capability Catalog
          version: 0.1.0
          url: https://github.com/complytime/complyctl
          description: >
              Internal capability definitions for the complyctl compliance runtime
              covering OCI retrieval, plugin execution, gRPC communication,
              workspace configuration, policy resolution, target variable injection,
              and report generation.

groups:
    - id: supply-chain
      title: Supply Chain
      description: >
          Threats related to the integrity and authenticity of artifacts and
          binaries consumed by the compliance workflow.
    - id: credential-management
      title: Credential Management
      description: >
          Threats related to the handling, transmission, and storage of
          authentication credentials and sensitive configuration values.
    - id: plugin-execution
      title: Plugin Execution
      description: >
          Threats related to the discovery, loading, and runtime behavior
          of provider plugin subprocesses.
    - id: information-disclosure
      title: Information Disclosure
      description: >
          Threats related to unintended exposure of sensitive information
          through logs, error messages, or insecure transport.

threats:
    - id: CT.COMPLYCTL.THR02
      title: OCI Registry Artifact Tampering
      group: supply-chain
      description: >
          Policy artifacts fetched by mutable tags (e.g., "latest") without content
          digest pinning allow a compromised or man-in-the-middle registry to serve
          malicious catalog, guidance, or policy layers. The cache sync stores whatever
          the registry serves without verifying content against a known-good digest.
      mitigations:
          - id: CT.COMPLYCTL.THR02.MIT01
            status: implemented
            description: >
                complyctl get emits a NOTE to stderr when a freshly fetched policy
                or complypack was fetched without signature verification, directing
                users to the planned sigstore-go integration (#643) and advising
                them to ensure policy sources are trusted.
          - id: CT.COMPLYCTL.THR02.MIT03
            status: implemented
            description: >
                complyctl list surfaces a DIGEST column from cache state, giving
                operators CLI-level visibility into the OCI manifest digest of each
                cached policy.
      capabilities:
          - reference-id: CCC
            entries:
                - reference-id: CCC.Core.CP29
                - reference-id: CCC.Core.CP18
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP01

    - id: CT.COMPLYCTL.THR03
      title: Credential Exposure via Target Variable Transmission
      group: credential-management
      description: >
          Target variables carrying authentication tokens and connection strings
          are resolved from environment variables at config load time, serialized
          into gRPC messages, and transmitted to plugin subprocesses. This crosses
          a process boundary — every plugin receiving a routed request gains access
          to the target variables included in that request. Unresolved ${VAR}
          references that fail silently could mask missing credentials, and
          plaintext persistence in complytime.yaml widens the exposure surface.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP04
                - reference-id: CT.COMPLYCTL.CAP06
                - reference-id: CT.COMPLYCTL.CAP03

    - id: CT.COMPLYCTL.THR04
      title: Plugin Binary Substitution
      group: plugin-execution
      description: >
          An attacker with write access to the plugin directory can replace a
          legitimate complyctl-provider-* binary with a malicious executable. The
          current discovery mechanism matches only on filename prefix and executable
          permission — it does not verify binary integrity via digest, signature, or
          code-signing. A substituted binary inherits the host process's trust
          context including gRPC AutoMTLS and target variables.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP02

    - id: CT.COMPLYCTL.THR05
      title: Plugin Subprocess Privilege Escalation
      group: plugin-execution
      description: >
          Plugin subprocesses launched by hashicorp/go-plugin execute with the same
          OS-level privileges as the parent complyctl process. A compromised or
          malicious plugin can access all files, environment variables, and network
          resources available to the invoking user. No sandboxing, namespace
          isolation, or capability restrictions are applied to plugin processes.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP02
                - reference-id: CT.COMPLYCTL.CAP03

    - id: CT.COMPLYCTL.THR06
      title: Insecure Registry Transport Downgrade
      group: information-disclosure
      description: >
          The registry client automatically enables plainHTTP when the configured
          registry URL uses an http:// scheme, with no warning to the user. This
          exposes OCI manifest and blob traffic (including authentication credentials
          if configured) to network-level interception and modification.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP01

    - id: CT.COMPLYCTL.THR07
      title: Unverified Plugin Assessment Results
      group: plugin-execution
      description: >
          The host CLI accepts plugin-reported assessment results (pass/fail/skip/error)
          at face value with no independent verification. If a plugin produces incorrect
          results due to bugs, misconfiguration, or version skew, the evaluation log
          and downstream compliance reports will reflect those inaccuracies. Preserving
          raw step-level results enables downstream consumers to audit provenance and
          detect inconsistencies.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP03
                - reference-id: CT.COMPLYCTL.CAP07

    - id: CT.COMPLYCTL.THR08
      title: Log File Information Disclosure
      group: information-disclosure
      description: >
          The complyctl log file (complytime.log) captures structured log output
          including plugin communication details, configuration values, and error
          messages. If target variables containing credentials are logged at debug
          or info level — or appear in error messages — the log file becomes a
          secondary credential store readable by any process with access to the
          working directory.
      capabilities:
          - reference-id: CT.COMPLYCTL.CAP
            entries:
                - reference-id: CT.COMPLYCTL.CAP04
                - reference-id: CT.COMPLYCTL.CAP07
