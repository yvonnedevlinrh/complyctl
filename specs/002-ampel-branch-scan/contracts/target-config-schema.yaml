# Target Repository Configuration Schema
# File: {workspace}/ampel/ampel-targets.yaml
#
# This file defines which GitHub/GitLab repositories the AMPEL
# plugin scans for branch protection compliance.

# Example:
# repositories:
#   - url: https://github.com/myorg/myrepo
#     branches:
#       - main
#       - release
#     specs:
#       - builtin:github/branch-rules.yaml
#   - url: https://github.com/myorg/another-repo
#     branches:
#       - main
#     specs:
#       - builtin:github/branch-rules.yaml
#       - /opt/specs/custom-check.yaml

# Schema definition (expressed as Go struct tags for reference):
#
# type TargetConfig struct {
#     Repositories []TargetRepository `yaml:"repositories"`
# }
#
# type TargetRepository struct {
#     URL      string   `yaml:"url"`
#     Branches []string `yaml:"branches"`
#     Specs    []string `yaml:"specs"`
# }
#
# Validation rules:
# - repositories: required, non-empty array
# - url: required, valid HTTPS URL, must point to github.com or
#   gitlab.com (or self-hosted instances)
# - branches: required, non-empty array of branch name strings
# - specs: required, non-empty array of spec file references
#   - "builtin:" prefix for embedded spec files
#   - Absolute paths for custom spec files
# - Duplicate url+branch combinations: warned and deduplicated
# - Duplicate specs within a repository: deduplicated
